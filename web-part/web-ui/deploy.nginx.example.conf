server {
    listen 80;
    server_name _;

    location / {
        root /home/deploy/Mechanical-Design-Competition;
        try_files $uri $uri/ /index.html;
    }

    location /sr/ {
        alias /home/deploy/sr/web-ui/app/dist/;
        try_files $uri $uri/ /sr/index.html;
    }

    location /api/openclaw/ {
        proxy_pass http://127.0.0.1:9002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/sr/openclaw/ {
        proxy_pass http://127.0.0.1:9012/api/openclaw/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /sr-webhook {
        proxy_pass http://127.0.0.1:9010/sr-webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
